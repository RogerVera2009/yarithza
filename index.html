<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Yarithza ❤️</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff7eb3,#ffb6d9,#ffd6ec);
text-align:center;
color:white;
overflow:hidden;
}

#inicio{
position:fixed;
width:100%;
height:100%;
background:#ff7eb3;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

#inicio h1{
font-size:9vw;
}

#inicio button{
padding:15px 30px;
font-size:5vw;
border:none;
border-radius:15px;
background:white;
color:#ff2e88;
cursor:pointer;
}

#contenido{
display:none;
padding:20px;
}

h1{
font-size:8vw;
}

h2{
font-size:6vw;
}

#mensaje{
max-width:600px;
margin:auto;
font-size:5vw;
min-height:120px;
}

img{
width:80%;
max-width:300px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
margin-top:20px;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:5vw;
border:none;
border-radius:15px;
background:#ff2e88;
color:white;
cursor:pointer;
}

#contador{
font-size:5vw;
margin-top:20px;
}

.final{
font-size:9vw;
margin-top:30px;
display:none;
animation:latido 1.5s infinite;
}

@keyframes latido{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

.botones{
margin-top:20px;
}

#no{
position:absolute;
}

.corazon,.rosa{
position:absolute;
top:-10px;
animation:caer linear infinite;
}

.corazon{
font-size:24px;
animation-duration:6s;
}

.rosa{
font-size:24px;
animation-duration:8s;
}

@keyframes caer{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

</style>

</head>

<body>

<div id="inicio">

<h1>💖 Para Yarithza 💖</h1>

<button onclick="entrar()">Abrir sorpresa</button>

</div>

<div id="contenido">

<h1>🌸 Feliz Día de la Mujer 🌸</h1>

<h2>Para mi hermosa Yarithza ❤️</h2>

<div id="mensaje"></div>

<img src="yarithza.jpeg">

<div id="contador">💞 Hemos estado juntos por 286 días 💞</div>

<h2>💞 ¿Quieres seguir conmigo para siempre? 💞</h2>

<div class="botones">

<button onclick="si()">SI ❤️</button>

<button id="no" onmouseover="mover()">NO 😢</button>

</div>

<div id="final" class="final">❤️ TE AMO YARITHZA ❤️</div>

<audio autoplay loop>
<source src="musica.mp3.mp3" type="audio/mpeg">
</audio>

</div>

<script>

/* entrar */

function entrar(){
document.getElementById("inicio").style.display="none";
document.getElementById("contenido").style.display="block";
}

/* mensaje */

let texto="Yarithza, desde que llegaste a mi vida todo es más bonito. Tu sonrisa ilumina mis días y tu amor llena mi corazón. Gracias por ser una mujer increíble. Te amo muchísimo ❤️";

let i=0;

function escribir(){
if(i<texto.length){
document.getElementById("mensaje").innerHTML+=texto.charAt(i);
i++;
setTimeout(escribir,40);
}
}

setTimeout(escribir,500);

/* boton no se mueve */

function mover(){

let x=Math.random()*window.innerWidth-100;
let y=Math.random()*window.innerHeight-50;

let boton=document.getElementById("no");

boton.style.left=x+"px";
boton.style.top=y+"px";

}

/* si */

function si(){

document.getElementById("final").style.display="block";

fuegos();

}

/* fuegos artificiales */

function fuegos(){

for(let i=0;i<100;i++){

let fuego=document.createElement("div");

fuego.innerHTML="🎆";

fuego.style.position="absolute";

fuego.style.left=Math.random()*100+"vw";

fuego.style.top=Math.random()*100+"vh";

fuego.style.fontSize="30px";

document.body.appendChild(fuego);

setTimeout(()=>{fuego.remove();},2000);

}

}

/* corazones */

function crearCorazon(){

const c=document.createElement("div");

c.classList.add("corazon");

c.innerHTML="❤️";

c.style.left=Math.random()*100+"vw";

document.body.appendChild(c);

setTimeout(()=>{c.remove();},6000);

}

/* rosas */

function crearRosa(){

const r=document.createElement("div");

r.classList.add("rosa");

r.innerHTML="🌹";

r.style.left=Math.random()*100+"vw";

document.body.appendChild(r);

setTimeout(()=>{r.remove();},8000);

}

setInterval(crearCorazon,400);
setInterval(crearRosa,900);

</script>
<audio id="musica" loop>
<source src="musica.mp3.mp3" type="audio/mpeg">
</audio>

<button onclick="playMusic()">💖 Toca aquí para escuchar la música 💖</button>

<script>
function playMusic(){
document.getElementById("musica").play();
}
</script>

</body>
</html>
